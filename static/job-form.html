    <!-- Main::Start -->
    <main class="main">
      <section class="section article-section">
        <div class="container">
          <h2 class="section-title">
            Post a job here. Please read the
            <a href="./guidelines.html" class="link">guidelines</a> before
            posting any job.
          </h2>
          <form class="article-form" method="post">
            <div class="form-group">
              <label for="position" class="form-label">Position</label>
              <input
                type="text"
                id="position"
                name="position"
                class="form-control"
                placeholder="i.e. Software Engineer"
                required
              />
            </div>

            <div class="form-group">
              <label for="url" class="form-label">URL</label>
              <input
                type="url"
                id="url"
                name="url"
                class="form-control"
                placeholder="http(s)://example.com"
                required
              />
            </div>

            <div class="form-group">
              <label for="type" class="form-label">Type</label>
              <select id="type" name="type" class="form-control" required>
                <option value="" disabled selected>Select job type</option>
                <option value="full-time">Full-time</option>
                <option value="part-time">Part-time</option>
                <option value="contract">Contract</option>
                <option value="internship">Internship</option>
                <option value="temporary">Temporary</option>
              </select>
            </div>

            <div class="form-group">
              <label for="deadline" class="form-label">Deadline</label>
              <input
                type="date"
                id="deadline"
                name="deadline"
                class="form-control"
                placeholder="i.e. YYYY-MM-DD"
                required
              />
            </div>

            <div class="form-group">
              <label for="remuneration" class="form-label">Remuneration</label>
              <input
                type="text"
                id="remuneration"
                name="remuneration"
                class="form-control"
                placeholder="i.e. $50,000 - $70,000/year"
                required
              />
            </div>

            <div class="form-group">
              <label for="text" class="form-label">Description</label>
              <textarea
                id="text"
                name="text"
                rows="6"
                class="form-control"
                placeholder="If no URL is provided, this will be a text post."
                required
              ></textarea>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Submit</button>
            </div>
          </form>
        </div>
      </section>
    </main>

        aria-labelledby="settingsTitle"

            aria-label="Close settings"

              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>

        </header>

        <div class="modal-body">
          <section class="settings-section">
            <div class="form-group">
              <label for="fontSizeSelect" class="form-label">Font Size:</label>
              <select id="fontSizeSelect" class="form-control">
                <option value="0.75">75%</option>
                <option value="0.875">87.5%</option>
                <option value="1">100%</option>
                <option value="1.25">125%</option>
                <option value="1.5" selected>150%</option>
              </select>
            </div>
            <div class="form-group">
              <label for="themeSelect" class="form-label">Theme:</label>
              <select id="themeSelect" class="form-control">
                <option value="light">Light</option>
                <option value="dark">Dark</option>
                <option value="system">System Default</option>

            </div>
